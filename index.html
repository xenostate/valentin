<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Валентинка для Яси</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1 class="title">Яся нажми на кнопку</h1>
        <button class="cta" id="showHeart" type="button">Нажать</button>
        <div class="heart-wrap" id="heartWrap" aria-hidden="true">
        <div class="heart" role="img" aria-label="Валентинка">
          <div class="heart-content">
            <img class="heart-image" src="writing.png" alt="Ты самая сильная милая смешная" />
          </div>
        </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
